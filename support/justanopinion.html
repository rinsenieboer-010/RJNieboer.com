<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support — Just an Opinion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b0b;
      --surface: #131313;
      --border: #222222;
      --text: #ede8df;
      --muted: #6a6560;
      --accent: #c8a96b;
      --accent-dim: rgba(200, 169, 107, 0.10);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2.5rem;
      border-bottom: 1px solid transparent;
      transition: border-color 0.4s, background 0.4s;
    }
    nav.scrolled {
      border-color: var(--border);
      background: rgba(11,11,11,0.85);
      backdrop-filter: blur(16px);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
    }
    .nav-back {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--accent); }
    .nav-back svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    main {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 10rem 2rem 6rem;
    }

    .eyebrow {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .eyebrow::before {
      content: '';
      width: 28px;
      height: 1px;
      background: var(--accent);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      font-weight: 300;
      line-height: 1;
      margin-bottom: 1.2rem;
    }
    h1 em { font-style: italic; color: var(--accent); }

    .intro {
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--muted);
      margin-bottom: 3.5rem;
      max-width: 52ch;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input, textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem;
      padding: 0.9rem 1.1rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      resize: none;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--muted); }

    textarea { min-height: 160px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.4rem; }

    button {
      align-self: flex-start;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.9rem 2.2rem;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    button:hover { background: var(--accent); color: var(--bg); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .status {
      font-size: 0.8rem;
      padding: 1rem 1.2rem;
      border: 1px solid var(--border);
      display: none;
    }
    .status.success { border-color: var(--accent); color: var(--accent); }
    .status.error { border-color: #a05050; color: #c07070; }

    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    footer p, footer a {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }
    footer a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      nav { padding: 1.2rem 1.5rem; }
      .row { grid-template-columns: 1fr; }
      button { align-self: stretch; justify-content: center; }
    }
  </style>
</head>
<body>

  <nav id="nav">
    <a class="nav-logo" href="/">RJ Nieboer</a>
    <a class="nav-back" href="/">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Terug
    </a>
  </nav>

  <main>
    <p class="eyebrow">Support</p>
    <h1>just<em>anopinion</em></h1>
    <p class="intro">
      Heb je een vraag, opmerking of probleem met Just an Opinion? Stuur een bericht en ik kom zo snel mogelijk bij je terug.
    </p>

    <form id="contactForm">
      <input type="hidden" name="site" value="Just an Opinion" />

      <div class="row">
        <div class="field">
          <label for="name">Naam</label>
          <input type="text" id="name" name="name" placeholder="Jouw naam" required />
        </div>
        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="jouw@email.com" required />
        </div>
      </div>

      <div class="field">
        <label for="subject">Onderwerp</label>
        <input type="text" id="subject" name="subject" placeholder="Waar gaat het over?" />
      </div>

      <div class="field">
        <label for="message">Bericht</label>
        <textarea id="message" name="message" placeholder="Beschrijf je vraag of probleem…" required></textarea>
      </div>

      <div class="status" id="status"></div>

      <button type="submit" id="submitBtn">
        Versturen
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 RJ Nieboer</p>
    <a href="mailto:hello@rjnieboer.com">hello@rjnieboer.com</a>
  </footer>

  <script>
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    }, { passive: true });

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const status = document.getElementById('status');
      const form = e.target;

      btn.disabled = true;
      btn.textContent = 'Versturen…';
      status.style.display = 'none';

      const data = {
        name: form.name.value,
        email: form.email.value,
        subject: form.subject.value,
        message: form.message.value,
        site: form.site.value,
      };

      try {
        const res = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        if (res.ok) {
          status.className = 'status success';
          status.textContent = 'Bericht verzonden. Ik neem zo snel mogelijk contact met je op.';
          status.style.display = 'block';
          form.reset();
        } else {
          throw new Error();
        }
      } catch {
        status.className = 'status error';
        status.textContent = 'Er ging iets mis. Probeer het opnieuw of stuur een e-mail naar hello@rjnieboer.com.';
        status.style.display = 'block';
      }

      btn.disabled = false;
      btn.innerHTML = 'Versturen <svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
    });
  </script>

</body>
</html>
